<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title%}{% endblock title %} | Expense Tracker</title>
    <link rel="stylesheet" href="{{url_for('static', filename='dist/output.css')}}">
    <script src="https://kit.fontawesome.com/05d28bde33.js" crossorigin="anonymous"></script>
</head>
<body class="bg-base-300 h-[90vh] w-full">
    <nav class="flex items-center justify-between p-3 bg-base-100 ">
        <a class="font-black text-2xl" href="{{url_for('index')}}">Expense Tracker</a>
        {% if current_user.is_authenticated %}
            <a class="btn btn-primary" href="{{ url_for('logout') }}"><button>Logout</button></a>
             <!-- <img class="w-10" src="{{url_for('static', filename='images/man.png')}}" alt=""> -->
        {% endif %}
    </nav>
    {% block body %}{% endblock body %}
</body>
</html>
